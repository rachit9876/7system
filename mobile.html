<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="View your 7System mind maps on the go.">
    <title>7System - Mobile Feed</title>
    <link rel="stylesheet" href="css/styles.css">

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script>
        mermaid.initialize({ startOnLoad: false, theme: 'default' });
    </script>
    <link rel="stylesheet" href="css/mobile.css">
</head>
<body>

    <header class="header">
        <div class="max-w-2xl w-full mx-auto flex justify-between items-center px-4">
            <div class="header-left flex items-center gap-2">
                <h1 class="text-2xl font-semibold tracking-tight">7System</h1>
            </div>
            <div class="flex gap-2 items-center">
                <button id="themeToggleBtn" class="p-2 border rounded transition-colors hover:bg-[var(--surface-muted)]" style="background: var(--surface); color: var(--text-primary); border-color: var(--border);">
                    <svg id="icon-light" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                    <svg id="icon-dark" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 0 1 8.646 3.646 9.003 9.003 0 0 0 12 21a9.003 9.003 0 0 0 8.354-5.646z"/></svg>
                </button>
                <a href="portal.html" id="portalBtn" class="hidden p-2 border rounded font-medium text-sm flex items-center justify-center transition-colors hover:bg-[var(--surface-muted)]" style="background: var(--surface); color: var(--text-primary); border-color: var(--border);">Portal</a>
                <button id="logoutBtn" class="hidden p-2 border rounded font-medium text-sm transition-colors hover:bg-[var(--surface-muted)]" style="background: var(--surface); color: var(--text-primary); border-color: var(--border);">Logout</button>
            </div>
        </div>
    </header>

    <main id="feedContainer" class="max-w-2xl mx-auto pb-10 hidden">
        <!-- Cards will be injected here -->
        <div id="feedLoader" class="loader"></div>
    </main>

    <!-- Login Overlay -->
    <div id="loginOverlay" class="overlay hidden">
        <div class="login-box">
            <h2 class="text-2xl font-bold mb-6 text-center">Login to View Feed</h2>
            <input type="email" id="usernameInput" class="input-field" placeholder="Email Address">
            <input type="password" id="passwordInput" class="input-field" placeholder="Password">
            <button id="loginSubmitBtn" class="mobile-btn mobile-btn-primary w-full py-3">Login / Register</button>
            <p id="loginError" class="text-red-500 mt-3 text-center text-sm hidden"></p>
        </div>
    </div>

    <!-- We define the API and Logic at the bottom -->
    <script type="module" src="js/api.js"></script>
    <script type="module" src="js/mobile.js"></script>
</body>
</html>
