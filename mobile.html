<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Map Mind - Mobile Feed</title>
    <link rel="stylesheet" href="styles.css">

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script>
        mermaid.initialize({ startOnLoad: false, theme: 'default' });
    </script>
    <style>
        body {
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            padding-top: 60px; /* For fixed header */
            overflow: auto !important;
        }
        
        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 60px;
            background: color-mix(in srgb, var(--surface) 90%, transparent);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1rem;
            z-index: 50;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin: 1rem;
            box-shadow: 0 4px 6px var(--shadow-dark);
            overflow: hidden;
        }

        .card-header {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-body {
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .node-content {
            background: var(--node-bg);
            border: 1px solid var(--node-border);
            border-radius: 8px;
            padding: 0.75rem;
            font-size: 0.95rem;
            line-height: 1.5;
            box-shadow: 0 2px 4px var(--node-shadow);
        }

        /* Markdown Styles */
        .node-content h1 { font-size: 1.5em; font-weight: bold; margin-bottom: 0.5em; }
        .node-content h2 { font-size: 1.3em; font-weight: bold; margin-bottom: 0.5em; }
        .node-content h3 { font-size: 1.1em; font-weight: bold; margin-bottom: 0.5em; }
        .node-content p { margin-bottom: 0.5em; }
        .node-content a { color: var(--link); text-decoration: underline; }
        .node-content img { max-width: 100%; border-radius: 4px; }
        .node-content ul { list-style-type: disc; padding-left: 1.5em; margin-bottom: 0.5em; }
        .node-content ol { list-style-type: decimal; padding-left: 1.5em; margin-bottom: 0.5em; }
        .node-content blockquote { border-left: 4px solid var(--border); padding-left: 1em; color: var(--text-secondary); margin-bottom: 0.5em; }
        .node-content pre { background: var(--bg); padding: 0.5em; border-radius: 4px; overflow-x: auto; margin-bottom: 0.5em; }
        .node-content code { font-family: monospace; background: var(--bg); padding: 0.2em 0.4em; border-radius: 3px; }
        
        .mermaid { display: flex; justify-content: center; overflow-x: auto; }

        /* Login Overlay */
        .overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .login-box {
            background: var(--surface);
            padding: 2rem;
            border-radius: 16px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px var(--shadow-dark);
        }
        
        .mobile-btn {
            background: var(--surface-muted);
            color: var(--text-primary);
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: auto;
            height: auto;
            box-shadow: none;
            transform: none;
        }
        .mobile-btn-primary {
            background: var(--accent);
            color: white;
            border: none;
        }
        .input-field {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
            color: var(--text-primary);
            margin-bottom: 1rem;
        }
        
        .loader {
            border: 3px solid var(--border);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header class="header">
        <h1 class="text-xl font-bold">Map Mind</h1>
        <div class="flex gap-2 items-center">
            <button id="themeToggleBtn" class="p-2 border rounded" style="background: var(--surface); color: var(--text-primary); border-color: var(--border);">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 0 1 8.646 3.646 9.003 9.003 0 0 0 12 21a9.003 9.003 0 0 0 8.354-5.646z"/></svg>
            </button>
            <a href="portal.html" id="portalBtn" class="hidden p-2 border rounded font-medium text-sm flex items-center justify-center" style="background: var(--surface); color: var(--text-primary); border-color: var(--border);">Portal</a>
            <button id="logoutBtn" class="hidden p-2 border rounded font-medium text-sm" style="background: var(--surface); color: var(--text-primary); border-color: var(--border);">Logout</button>
        </div>
    </header>

    <main id="feedContainer" class="max-w-2xl mx-auto pb-10 hidden">
        <!-- Cards will be injected here -->
        <div id="feedLoader" class="loader"></div>
    </main>

    <!-- Login Overlay -->
    <div id="loginOverlay" class="overlay hidden">
        <div class="login-box">
            <h2 class="text-2xl font-bold mb-6 text-center">Login to View Feed</h2>
            <input type="email" id="usernameInput" class="input-field" placeholder="Email Address">
            <input type="password" id="passwordInput" class="input-field" placeholder="Password">
            <button id="loginSubmitBtn" class="mobile-btn mobile-btn-primary w-full py-3">Login / Register</button>
            <p id="loginError" class="text-red-500 mt-3 text-center text-sm hidden"></p>
        </div>
    </div>

    <!-- We define the API and Logic at the bottom -->
    <script type="module" src="api.js"></script>
    <script type="module">
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";



        let sessionAuth = null;
        
        const loginOverlay = document.getElementById('loginOverlay');
        const feedContainer = document.getElementById('feedContainer');
        const logoutBtn = document.getElementById('logoutBtn');
        const portalBtn = document.getElementById('portalBtn');
        const feedLoader = document.getElementById('feedLoader');

        // Theme Toggle Logic
        const themeToggleBtn = document.getElementById('themeToggleBtn');
        const savedTheme = localStorage.getItem('mindmap-theme') || 'light';
        if (savedTheme === 'dark') document.documentElement.classList.add('dark');

        themeToggleBtn.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('mindmap-theme', isDark ? 'dark' : 'light');
            
            // Re-render mermaid diagrams with new theme
            mermaid.initialize({ startOnLoad: false, theme: isDark ? 'dark' : 'default' });
            document.querySelectorAll('.mermaid-code').forEach(async (el) => {
                try {
                    const { svg } = await mermaid.render('mermaid-' + Math.random().toString(36).substr(2, 9), el.textContent);
                    el.parentElement.innerHTML = svg;
                } catch(e) {}
            });
        });

        const checkAuth = () => {
            try {
                const storedAuth = localStorage.getItem('mapMindSessionAuth');
                if (storedAuth) {
                    const parsed = JSON.parse(storedAuth);
                    sessionAuth = { username: parsed.username };
                }
            } catch(e) {}
        };
        
        // Wait for Firebase to initialize
        setTimeout(() => {
            if (window.firebaseAuth) {
                onAuthStateChanged(window.firebaseAuth, (user) => {
                    if (user) {
                        sessionAuth = { username: user.email };
                        loginOverlay.classList.add('hidden');
                        feedContainer.classList.remove('hidden');
                        logoutBtn.classList.remove('hidden');
                        portalBtn.classList.remove('hidden');
                        loadFeed();
                    } else {
                        sessionAuth = null;
                        const urlParams = new URLSearchParams(window.location.search);
                        if (!urlParams.get('u') || !urlParams.get('m')) {
                            feedContainer.innerHTML = '<div id="feedLoader" class="loader"></div>';
                            feedContainer.classList.add('hidden');
                            loginOverlay.classList.remove('hidden');
                            logoutBtn.classList.add('hidden');
                            portalBtn.classList.add('hidden');
                        }
                    }
                });
            }
        }, 100);

        document.getElementById('loginSubmitBtn').addEventListener('click', async () => {
            const u = document.getElementById('usernameInput').value;
            const p = document.getElementById('passwordInput').value;
            if (!u || !p) return;
            
            const btn = document.getElementById('loginSubmitBtn');
            btn.textContent = 'Authenticating...';
            btn.disabled = true;

            const result = await window.firebaseUtils.loginRegister(u, p);
            
            btn.textContent = 'Login / Register';
            btn.disabled = false;

            if (result.success) {
                sessionAuth = { username: u };
                localStorage.setItem('mapMindSessionAuth', JSON.stringify(sessionAuth));
                // UI updates handled by onAuthStateChanged
            } else {
                const err = document.getElementById('loginError');
                err.textContent = result.message;
                err.classList.remove('hidden');
            }
        });

        logoutBtn.addEventListener('click', async () => {
            if (window.firebaseAuth) {
                const { signOut } = await import("https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js");
                await signOut(window.firebaseAuth);
            }
            localStorage.removeItem('mapMindSessionAuth');
            sessionAuth = null;
        });

        // Config marked.js to intercept mermaid blocks
        const renderer = new marked.Renderer();
        renderer.code = function({text, lang, escaped}) {
            if (lang === 'mermaid') {
                return `<div class="mermaid"><span class="mermaid-code hidden">${text}</span>Rendering diagram...</div>`;
            }
            return `<pre><code>${text}</code></pre>`;
        };
        marked.use({ renderer });

        const loadFeed = async () => {
            feedLoader.style.display = 'block';
            
            const listResult = await window.firebaseUtils.getMindMapsList(sessionAuth.username, null);
            
            if (!listResult.success) {
                feedContainer.innerHTML = `<p class="text-center mt-10 text-red-500">Failed to load feed.</p>`;
                return;
            }

            if (!listResult.mindmaps || listResult.mindmaps.length === 0) {
                feedContainer.innerHTML = `<p class="text-center mt-10 text-[var(--text-secondary)]">You don't have any mind maps yet. Go to desktop to create some!</p>`;
                return;
            }

            feedLoader.style.display = 'none';

            // Just render the shells to save bandwidth
            for (const mapInfo of listResult.mindmaps) {
                renderCardShell(mapInfo);
            }
        };

        const renderCardShell = (mapInfo) => {
            const card = document.createElement('div');
            card.className = 'card';
            

            const safeName = escapeHtml(mapInfo.name);

            const header = document.createElement('div');
            header.className = 'card-header cursor-pointer hover:bg-[var(--surface-muted)] transition-colors select-none';
            header.innerHTML = `
                <div class="flex items-center gap-3">
                    <svg class="w-4 h-4 transform transition-transform duration-200 chevron" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                    <h3 class="font-bold text-lg text-[var(--text-primary)]">${safeName}</h3>
                </div>
                <span class="text-sm text-[var(--text-secondary)]">${mapInfo.timestamp ? new Date(mapInfo.timestamp).toLocaleDateString() : 'Unknown'}</span>
            `;

            const body = document.createElement('div');
            body.className = 'card-body hidden';
            
            let isLoaded = false;
            let isLoading = false;

            header.addEventListener('click', async () => {
                const chevron = header.querySelector('.chevron');
                const isHidden = body.classList.contains('hidden');
                
                if (isHidden) {
                    body.classList.remove('hidden');
                    chevron.classList.add('rotate-90');
                    
                    if (!isLoaded && !isLoading) {
                        isLoading = true;
                        body.innerHTML = '<div class="loader !my-4 w-6 h-6 border-2"></div>';
                        const mapResult = await window.firebaseUtils.loadMindMap(sessionAuth.username, null, mapInfo.name, mapInfo.key);
                        if (mapResult.success && mapResult.data && mapResult.data.nodes) {
                            renderNodes(body, mapResult.data.nodes);
                            isLoaded = true;
                        } else {
                            body.innerHTML = '<p class="text-red-500 text-center">Failed to load content.</p>';
                        }
                        isLoading = false;
                    }
                } else {
                    body.classList.add('hidden');
                    chevron.classList.remove('rotate-90');
                }
            });

            card.appendChild(header);
            card.appendChild(body);
            feedContainer.appendChild(card);
        };
        
        const renderNodes = (container, nodes) => {
            let nodesHtml = '';
            
            nodes.forEach(node => {
                if (!node.text) return;
                const dirtyHtml = marked.parse(node.text);
                const cleanHtml = DOMPurify.sanitize(dirtyHtml, { ADD_ATTR: ['target'] });
                nodesHtml += `<div class="node-content">${cleanHtml}</div>`;
            });
            
            container.innerHTML = nodesHtml;
            
            const isDark = document.documentElement.classList.contains('dark');
            mermaid.initialize({ startOnLoad: false, theme: isDark ? 'dark' : 'default' });
            
            container.querySelectorAll('.mermaid-code').forEach(async (el) => {
                try {
                    const id = 'mermaid-' + Math.random().toString(36).substr(2, 9);
                    const { svg } = await mermaid.render(id, el.textContent);
                    el.parentElement.innerHTML = svg;
                } catch(e) {
                    el.parentElement.innerHTML = '<span class="text-red-500">Diagram Error</span>';
                }
            });
        };

        const init = async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const pubUsername = urlParams.get('u');
            const pubMapName = urlParams.get('m');

            if (pubUsername && pubMapName) {
                // Public Viewer Mode
                loginOverlay.classList.add('hidden');
                feedContainer.classList.remove('hidden');
                logoutBtn.classList.add('hidden');
                portalBtn.classList.add('hidden');
                
                feedLoader.style.display = 'block';
                const mapResult = await window.firebaseUtils.loadPublicMindMap(pubUsername, pubMapName);
                feedLoader.style.display = 'none';

                if (mapResult.success && mapResult.data && mapResult.data.nodes) {
                    const card = document.createElement('div');
                    card.className = 'card';
                    

                    const safeName = escapeHtml(pubMapName);
                    
                    const header = document.createElement('div');
                    header.className = 'card-header';
                    header.innerHTML = `
                        <div class="flex items-center gap-3">
                            <h3 class="font-bold text-lg text-[var(--text-primary)]">${safeName}</h3>
                        </div>
                        <span class="text-xs bg-[var(--accent-soft)] text-[var(--accent)] px-2 py-1 rounded-full font-medium">Public View</span>
                    `;

                    const body = document.createElement('div');
                    body.className = 'card-body';
                    renderNodes(body, mapResult.data.nodes);
                    
                    card.appendChild(header);
                    card.appendChild(body);
                    feedContainer.appendChild(card);
                } else {
                    feedContainer.innerHTML = `<p class="text-center mt-10 text-red-500">${mapResult.message || 'Failed to load public map'}</p>`;
                }
            } else {
                // Normal Authenticated Mode
                checkAuth();
            }
        };

        init();
    </script>
</body>
</html>
